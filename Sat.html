<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SATELLITE COMMAND // V11 PRO</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #050510;
      --panel-bg: #0f0f1a;
      --card-bg: #16162a;
      --fg: #e0e0f0;
      --accent: #00e0ff;
      --ok: #00ff9d;
      --warn: #ffcc00;
      --err: #ff4466;
      --border: #2a2a44;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      height:100%; background:var(--bg); font-family:'Segoe UI', 'Courier New', monospace;
      overflow:hidden; color:var(--fg);
    }
    #map { height:100vh; width:100vw; }
    .sat-tooltip {
      background: rgba(0,0,0,0.85); border:1px solid var(--accent);
      color:var(--accent); font-size:10px; padding:4px 8px; border-radius:6px;
      font-weight:bold; white-space:nowrap; box-shadow:0 0 15px rgba(0,224,255,0.5);
    }
    #fab {
      position:absolute; bottom:30px; right:30px; width:65px; height:65px;
      background:var(--accent); color:#000; border-radius:50%; display:flex;
      align-items:center; justify-content:center; cursor:pointer; z-index:2000;
      font-size:34px; box-shadow:0 10px 30px rgba(0,224,255,0.7);
      transition:0.2s; border:2px solid white;
    }
    #fab:hover { transform:scale(1.06); }
    #dash {
      position:absolute; top:20px; right:20px; width:500px; max-width:94vw;
      max-height:88vh; background:var(--panel-bg); border:2px solid var(--accent);
      box-shadow:0 0 40px rgba(0,224,255,0.4); border-radius:14px;
      display:none; flex-direction:column; z-index:1999; backdrop-filter:blur(12px);
    }
    .header {
      background:#000; padding:14px 18px; font-weight:bold; font-size:17px;
      display:flex; justify-content:space-between; align-items:center;
      border-bottom:2px solid var(--accent); color:var(--accent);
    }
    .progress-bar-container { background:#222; height:4px; width:100%; }
    .progress-fill { background:var(--ok); height:100%; width:0%; transition:0.3s; }
    .content { padding:12px 16px; overflow-y:auto; flex:1; }
    .search-area {
      display:flex; gap:8px; margin-bottom:14px; background:#1a1a2e;
      padding:8px; border-radius:8px; border:1px solid #333;
    }
    .search-area input {
      flex:1; background:#0a0a14; border:1px solid #444; color:white;
      padding:8px 12px; border-radius:6px; font-family:monospace;
    }
    .search-area button {
      background:var(--accent); color:#000; border:none; padding:8px 16px;
      border-radius:6px; font-weight:bold; cursor:pointer;
    }
    .toolbar {
      display:flex; gap:6px; flex-wrap:wrap; margin-bottom:15px;
    }
    .toolbar button {
      background:#222; color:#ddd; border:1px solid #444; padding:7px 12px;
      border-radius:6px; cursor:pointer; font-size:11px; font-weight:bold;
    }
    .toolbar button.active { background:var(--accent); color:#000; border-color:var(--accent); }
    .group-card {
      background:var(--card-bg); border-left:6px solid var(--accent);
      margin-bottom:14px; padding:14px; border-radius:8px;
    }
    .group-header {
      display:flex; justify-content:space-between; align-items:center;
      font-weight:bold; margin-bottom:6px;
    }
    .drift-badge { font-size:11px; padding:3px 10px; border-radius:20px; background:#000; }
    .error-badge { font-size:10px; color:var(--warn); }
    button {
      padding:7px 13px; margin:3px 3px; font-size:11px; font-weight:bold;
      background:#2a2a3a; color:white; border:1px solid #444; border-radius:6px;
      cursor:pointer; transition:0.2s;
    }
    button.fetch { border-color:var(--ok); color:var(--ok); }
    button.active { background:var(--accent); color:#000; }
    textarea {
      width:100%; height:70px; margin-top:8px; background:#0a0a14;
      color:#0f0; border:1px solid #555; display:none; padding:6px;
    }
    .bookmark-list { margin-top:8px; font-size:10px; color:#aaa; }
    .bookmark-item { cursor:pointer; padding:3px 6px; border-radius:4px; }
    .bookmark-item:hover { background:#2a2a44; }
  </style>
</head>
<body>
<div id="fab" onclick="toggleDash()">🛰️</div>
<div id="dash">
  <div class="header">
    <span>🛸 COMMAND PRO V11</span>
    <span onclick="toggleDash()" style="cursor:pointer; font-size:24px;">×</span>
  </div>
  <div class="progress-bar-container"><div id="p-bar" class="progress-fill"></div></div>
  <div class="content" id="controls"></div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
(function() {
  const GROUPS = {
    "ISS": { slug:"stations", color:"#ff4466" },
    "NAVIC": { slug:"irnss", color:"#2ecc71" },
    "STARLINK": { slug:"starlink", color:"#3498db" },
    "GPS": { slug:"gps-ops", color:"#f39c12" },
    "ONEWEB": { slug:"oneweb", color:"#9b59b6" },
    "IRIDIUM": { slug:"iridium", color:"#e67e22" }
  };

  let satVault = {};
  let enabled = {};
  let markers = {};
  let pathPolylines = {};
  let bookmarks = JSON.parse(localStorage.getItem('sat_bookmarks') || '[]');
  let searchMarker = null;
  let celestialDataCache = {};

  const map = L.map('map', { zoomControl:false, preferCanvas:true }).setView([23.5,88],5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:18 }).addTo(map);
  L.control.zoom({ position:'topleft' }).addTo(map);

  function loadState() {
    satVault = JSON.parse(localStorage.getItem('sat_v11') || '{}');
    enabled = JSON.parse(localStorage.getItem('sat_v11_enabled') || '{}');
    Object.keys(GROUPS).forEach(k => { if(typeof enabled[k]!=='boolean') enabled[k]=false; });
  }
  function saveVault() { localStorage.setItem('sat_v11', JSON.stringify(satVault)); }
  function saveEnabled() { localStorage.setItem('sat_v11_enabled', JSON.stringify(enabled)); }

  function toggleDash() {
    const d = document.getElementById('dash');
    d.style.display = (d.style.display==='flex')?'none':'flex';
    if(d.style.display==='flex') renderDashboard();
  }

  function fetchUpdate(key) {
    const bar = document.getElementById('p-bar');
    bar.style.width='40%';
    const btn = document.getElementById(`fbtn-${key}`);
    if(btn) btn.innerText='...';
    fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(`https://celestrak.org/NORAD/elements/gp.php?GROUP=${GROUPS[key].slug}&FORMAT=tle`)}`)
    .then(r=>r.text()).then(txt=>{
      if(txt.length<80) throw new Error('invalid');
      satVault[key]={tles:txt, ts:Date.now()};
      saveVault(); bar.style.width='100%';
      if(btn) btn.innerText='OK';
      renderDashboard(); updateAllMarkers(true);
      setTimeout(()=>bar.style.width='0%',1000);
    }).catch(e=>{
      bar.style.width='0%'; if(btn) btn.innerText='FAIL';
      document.getElementById(`area-${key}`).style.display='block';
      alert('Fetch failed. Use manual paste.');
    });
  }

  function manualIn(key) {
    const val = document.getElementById(`area-${key}`).value.trim();
    if(val.length>60){ satVault[key]={tles:val, ts:Date.now()}; saveVault(); renderDashboard(); updateAllMarkers(true); }
  }

  function toggleVis(key) {
    enabled[key]=!enabled[key]; saveEnabled();
    if(!enabled[key]){ clearGroupMarkers(key); } else { updateGroupMarkers(key,true); }
    renderDashboard();
  }

  function deleteGroup(key) {
    if(!confirm(`Delete ${key}?`))return;
    delete satVault[key]; clearGroupMarkers(key); enabled[key]=false;
    saveVault(); saveEnabled(); renderDashboard();
  }

  function clearGroupMarkers(key) {
    if(markers[key]){ Object.values(markers[key]).forEach(m=>map.removeLayer(m)); delete markers[key]; }
    if(pathPolylines[key]){ Object.values(pathPolylines[key]).forEach(l=>map.removeLayer(l)); delete pathPolylines[key]; }
  }

  function toggleAll(show) {
    Object.keys(GROUPS).forEach(k=>{ enabled[k]=show; });
    saveEnabled();
    if(!show) { Object.keys(GROUPS).forEach(k=>clearGroupMarkers(k)); }
    else { updateAllMarkers(true); }
    renderDashboard();
  }

  function updateAll() {
    Object.keys(GROUPS).forEach(k=>fetchUpdate(k));
  }

  // ---- PROPAGATION & PATH ----
  function parseTLE(txt) {
    const lines = txt.split('\n').filter(l=>l.trim().length>0);
    const sats = [];
    for(let i=0;i<lines.length-2;i+=3){
      const n=lines[i].trim(), l1=lines[i+1].trim(), l2=lines[i+2].trim();
      if(l1.length>=69 && l2.length>=69) sats.push({name:n,line1:l1,line2:l2});
    }
    return sats;
  }

  function propagateSat(satrec, time) {
    try {
      const pv = satellite.propagate(satrec, time);
      const gmst = satellite.gstime(time);
      const geo = satellite.eciToGeodetic(pv.position, gmst);
      return {
        lat: satellite.degreesLat(geo.latitude),
        lng: satellite.degreesLong(geo.longitude),
        alt: geo.height
      };
    } catch(e) { return null; }
  }

  function computePath(satrec, startTime, minutesAhead, steps=12) {
    const pts = [];
    for(let i=0;i<=steps;i++) {
      const t = new Date(startTime.getTime() + (i * minutesAhead * 60000 / steps));
      const pos = propagateSat(satrec, t);
      if(pos) pts.push([pos.lat, pos.lng]);
    }
    return pts;
  }

  function updateGroupMarkers(key, force=false) {
    if(!enabled[key] || !satVault[key]) return;
    const now = new Date();
    const color = GROUPS[key].color;
    if(!markers[key]) markers[key] = {};
    if(!pathPolylines[key]) pathPolylines[key] = {};
    const sats = parseTLE(satVault[key].tles);
    const currentNames = new Set(sats.map(s=>s.name));

    Object.keys(markers[key]).forEach(n=>{ if(!currentNames.has(n)){ map.removeLayer(markers[key][n]); delete markers[key][n]; } });
    Object.keys(pathPolylines[key]).forEach(n=>{ if(!currentNames.has(n)){ map.removeLayer(pathPolylines[key][n]); delete pathPolylines[key][n]; } });

    sats.forEach(sat=>{
      try {
        const satrec = satellite.twoline2satrec(sat.line1, sat.line2);
        const posNow = propagateSat(satrec, now);
        if(!posNow) return;
        const pos = [posNow.lat, posNow.lng];
        if(markers[key][sat.name]) {
          markers[key][sat.name].setLatLng(pos);
          markers[key][sat.name].setTooltipContent(`${sat.name} · ${posNow.alt.toFixed(0)}km`);
        } else {
          const m = L.circleMarker(pos, {radius:4, color:color, fillColor:color, fillOpacity:0.9}).addTo(map);
          m.bindTooltip(`${sat.name} · ${posNow.alt.toFixed(0)}km`, {className:'sat-tooltip'});
          markers[key][sat.name]=m;
        }
        // 30-min projected path
        const pathPts = computePath(satrec, now, 30, 18);
        if(pathPts.length>1) {
          if(pathPolylines[key][sat.name]) {
            pathPolylines[key][sat.name].setLatLngs(pathPts);
          } else {
            const line = L.polyline(pathPts, {color:color, weight:1.5, opacity:0.5, dashArray:'5,6'}).addTo(map);
            pathPolylines[key][sat.name]=line;
          }
        }
      } catch(e){}
    });
  }

  function updateAllMarkers(force=false) {
    Object.keys(GROUPS).forEach(k=>{ if(enabled[k]) updateGroupMarkers(k,force); });
  }

  // ---- TRACKING ERROR (SGP4 vs Celestrak reference) ----
  function computeTrackingError(key) {
    const data = satVault[key];
    if(!data) return null;
    const hours = (Date.now()-data.ts)/3600000;
    // Rough model: SGP4 error grows ~1-3 km per day depending on orbit
    return (hours * 0.12).toFixed(1); // approx km drift
  }

  // ---- SEARCH & BOOKMARKS ----
  async function searchPlace() {
    const q = document.getElementById('search-input').value.trim();
    if(!q) return;
    try {
      const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`);
      const data = await resp.json();
      if(data.length>0) {
        const lat = parseFloat(data[0].lat), lon = parseFloat(data[0].lon);
        map.setView([lat, lon], 10);
        if(searchMarker) map.removeLayer(searchMarker);
        searchMarker = L.marker([lat,lon]).addTo(map).bindPopup(`📍 ${data[0].display_name}`).openPopup();
        analyzeApproachingSatellites(lat, lon);
        document.getElementById('bookmark-btn').style.display='inline-block';
        window.lastSearch = {lat,lon,name:data[0].display_name};
      }
    } catch(e) { alert('Search failed'); }
  }

  function addBookmark() {
    if(!window.lastSearch) return;
    bookmarks.push(window.lastSearch);
    localStorage.setItem('sat_bookmarks', JSON.stringify(bookmarks));
    renderBookmarks();
  }

  function goToBookmark(lat,lon) {
    map.setView([lat,lon],10);
    if(searchMarker) map.removeLayer(searchMarker);
    searchMarker = L.marker([lat,lon]).addTo(map);
    analyzeApproachingSatellites(lat,lon);
  }

  function renderBookmarks() {
    const container = document.getElementById('bookmark-list');
    if(!container) return;
    container.innerHTML = bookmarks.map((b,i)=> 
      `<span class="bookmark-item" onclick="goToBookmark(${b.lat},${b.lon})">📍 ${b.name||'Point'}</span> `
    ).join('');
  }

  function analyzeApproachingSatellites(lat, lon) {
    const now = new Date();
    let totalApproaching = 0;
    let nextPass = null;
    Object.keys(enabled).forEach(key=>{
      if(!enabled[key] || !satVault[key]) return;
      const sats = parseTLE(satVault[key].tles);
      sats.forEach(sat=>{
        try {
          const satrec = satellite.twoline2satrec(sat.line1, sat.line2);
          for(let min=0; min<1440; min+=5) {
            const future = new Date(now.getTime()+min*60000);
            const pos = propagateSat(satrec, future);
            if(pos) {
              const dist = getDistanceKm(lat,lon,pos.lat,pos.lng);
              if(dist<500) { totalApproaching++; if(!nextPass || min<nextPass.min) nextPass={name:sat.name, min}; break; }
            }
          }
        } catch(e){}
      });
    });
    const msg = totalApproaching>0 ? 
      `🛰️ ~${totalApproaching} satellites within 500km in next 24h. ${nextPass?'Next: '+nextPass.name+' in ~'+nextPass.min+'min':''}` :
      '📡 No close passes predicted soon.';
    if(searchMarker) searchMarker.setPopupContent(msg).openPopup();
  }

  function getDistanceKm(lat1,lon1,lat2,lon2) {
    const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }

  window.goToBookmark = goToBookmark;

  function renderDashboard() {
    const html = `
      <div class="search-area">
        <input id="search-input" placeholder="Search city or place..." onkeypress="if(event.key==='Enter')searchPlace()"/>
        <button onclick="searchPlace()">🔍</button>
        <button id="bookmark-btn" onclick="addBookmark()" style="display:none;">⭐ Save</button>
      </div>
      <div class="bookmark-list" id="bookmark-list"></div>
      <div class="toolbar">
        <button onclick="updateAll()">⬇ UPDATE ALL</button>
        <button onclick="toggleAll(true)" class="${Object.values(enabled).every(v=>v)?'active':''}">👁 SHOW ALL</button>
        <button onclick="toggleAll(false)">🙈 HIDE ALL</button>
      </div>
      ${Object.keys(GROUPS).map(key=>{
        const data = satVault[key];
        const hours = data ? (Date.now()-data.ts)/3600000 : 999;
        const drift = computeTrackingError(key);
        return `
        <div class="group-card" style="border-left-color:${GROUPS[key].color}">
          <div class="group-header">
            <span style="color:${GROUPS[key].color}">${key}</span>
            <span class="drift-badge" style="color:${hours<6?'lime':hours<48?'yellow':'red'}">⏱ ${data?Math.floor(hours)+'h':'?'}</span>
          </div>
          <div class="error-badge">📡 Tracking error ~${drift||'?'} km</div>
          <button class="fetch" id="fbtn-${key}" onclick="fetchUpdate('${key}')">FETCH</button>
          <button onclick="toggleVis('${key}')" class="${enabled[key]?'active':''}">${enabled[key]?'HIDE':'SHOW'}</button>
          <button onclick="deleteGroup('${key}')" style="color:#f66;">DEL</button>
          <textarea id="area-${key}" placeholder="Paste TLE..." oninput="manualIn('${key}')"></textarea>
        </div>`;
      }).join('')}
    `;
    document.getElementById('controls').innerHTML = html;
    renderBookmarks();
  }

  function animationLoop() {
    updateAllMarkers();
    requestAnimationFrame(animationLoop);
  }

  window.fetchUpdate = fetchUpdate;
  window.toggleVis = toggleVis;
  window.deleteGroup = deleteGroup;
  window.searchPlace = searchPlace;
  window.addBookmark = addBookmark;
  window.toggleAll = toggleAll;
  window.updateAll = updateAll;
  window.manualIn = manualIn;

  loadState();
  document.getElementById('dash').style.display = 'flex';
  renderDashboard();
  animationLoop();
})();
</script>
</body>
</html>
