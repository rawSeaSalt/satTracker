<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SATCOM // V12</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{
  --bg:#060810;--panel:#0c1018;--panel2:#111825;--border:#1a2d3d;--border2:#253d52;
  --fg:#b8cfe0;--fg2:#6a8fa8;--fg3:#3a5a70;
  --acc:#00ccff;--acc2:#0088bb;--acc3:#004466;
  --ok:#00ff9d;--warn:#ffd600;--err:#ff4455;--err2:#661122;
  --iss:#ff4455;--navic:#00ff9d;--starlink:#00ccff;--gps:#ffd600;--oneweb:#cc66ff;--iridium:#ff8833;
  --track-w:1.5;
}
*{box-sizing:border-box;margin:0;padding:0;}
body,html{height:100%;background:var(--bg);color:var(--fg);font-family:'Share Tech Mono',monospace;overflow:hidden;}
#map{height:100vh;width:100vw;}
.leaflet-tile{filter:saturate(0.12) brightness(0.5) hue-rotate(185deg);}
.leaflet-control-zoom a{background:var(--panel)!important;color:var(--acc)!important;border-color:var(--border)!important;}

/* ─ SCAN LINES ─ */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9998;}

/* ─ TOP SEARCH BAR ─ */
#searchbar{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:min(520px,calc(100vw - 200px));z-index:2000;
  display:flex;gap:6px;
}
#search-input{
  flex:1;background:rgba(6,8,16,0.92);border:1px solid var(--border2);
  color:var(--fg);padding:9px 14px;font-family:'Share Tech Mono',monospace;font-size:12px;
  border-radius:3px;outline:none;transition:border-color 0.2s;
  backdrop-filter:blur(8px);
}
#search-input:focus{border-color:var(--acc);}
#search-input::placeholder{color:var(--fg3);}
#search-btn,#loc-btn{
  background:var(--acc);color:#000;border:none;padding:9px 14px;
  font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;
  cursor:pointer;border-radius:3px;white-space:nowrap;letter-spacing:1px;
  transition:all 0.15s;
}
#search-btn:hover{background:#00eeff;}
#loc-btn{background:var(--panel2);color:var(--acc);border:1px solid var(--border2);}
#loc-btn:hover{border-color:var(--acc);}
#search-results{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:rgba(10,14,22,0.98);border:1px solid var(--border2);border-radius:3px;
  display:none;z-index:2001;max-height:200px;overflow-y:auto;
}
.search-item{padding:8px 12px;cursor:pointer;font-size:11px;border-bottom:1px solid var(--border);transition:background 0.1s;}
.search-item:hover{background:var(--panel2);color:var(--acc);}

/* ─ FAB ─ */
#fab{
  position:absolute;bottom:28px;right:28px;width:58px;height:58px;
  background:var(--acc);color:#000;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2000;font-size:26px;
  box-shadow:0 0 0 3px rgba(0,204,255,0.15),0 0 25px rgba(0,204,255,0.5);
  animation:pring 3s ease-in-out infinite;transition:transform 0.2s;
}
#fab:hover{transform:scale(1.1);}
@keyframes pring{0%,100%{box-shadow:0 0 0 3px rgba(0,204,255,0.15),0 0 25px rgba(0,204,255,0.4);}50%{box-shadow:0 0 0 8px rgba(0,204,255,0.05),0 0 45px rgba(0,204,255,0.25);}}

/* ─ MAIN PANEL ─ */
#dash{
  position:absolute;top:60px;right:14px;
  width:min(400px,calc(100vw - 28px));
  max-height:calc(100vh - 74px);
  background:var(--panel);border:1px solid var(--border2);
  box-shadow:0 0 40px rgba(0,0,0,0.9),0 0 60px rgba(0,204,255,0.03);
  border-radius:4px;display:none;flex-direction:column;z-index:1999;overflow:hidden;
}
.hdr{
  background:#000;padding:12px 14px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border2);flex-shrink:0;
}
.hdr-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;color:var(--acc);letter-spacing:3px;flex:1;}
.hdr-close{color:var(--fg2);cursor:pointer;font-size:16px;transition:color 0.2s;}
.hdr-close:hover{color:var(--err);}

/* ─ STATUS ─ */
#status-bar{
  background:#000;padding:5px 14px;font-size:9px;
  display:flex;justify-content:space-between;gap:8px;
  border-bottom:1px solid var(--border);flex-shrink:0;letter-spacing:0.5px;
}
.s-ok{color:var(--ok)!important;}.s-warn{color:var(--warn)!important;}.s-err{color:var(--err)!important;}

/* ─ PROGRESS ─ */
.pbar{height:2px;background:#000;flex-shrink:0;}
#p-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--acc2),var(--acc));transition:width 0.35s;}

/* ─ TABS ─ */
.tabs{display:flex;background:#000;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:8px 4px;font-size:9px;letter-spacing:1px;text-align:center;cursor:pointer;color:var(--fg3);border-bottom:2px solid transparent;transition:all 0.15s;}
.tab:hover{color:var(--fg);}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);}

/* ─ CONTENT ─ */
.tab-panel{display:none;padding:10px;overflow-y:auto;flex:1;}
.tab-panel.active{display:block;}
.tab-panel::-webkit-scrollbar{width:3px;}
.tab-panel::-webkit-scrollbar-thumb{background:var(--border2);}

/* ─ GLOBAL ACTIONS ─ */
.global-actions{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.gbtn{
  flex:1;padding:7px 8px;font-size:9px;font-family:'Share Tech Mono',monospace;
  background:var(--panel2);color:var(--fg);border:1px solid var(--border);
  cursor:pointer;border-radius:2px;letter-spacing:1px;transition:all 0.15s;white-space:nowrap;text-align:center;
}
.gbtn:hover{border-color:var(--acc);color:var(--acc);}
.gbtn.active{background:var(--acc);color:#000;border-color:var(--acc);font-weight:700;}

/* ─ GROUP CARDS ─ */
.group-card{
  border:1px solid var(--border);border-left:3px solid currentColor;
  margin-bottom:8px;padding:10px;background:var(--panel2);border-radius:3px;
  transition:background 0.15s;
}
.group-card:hover{background:#141e2a;}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.card-name{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;flex:1;}
.card-badges{display:flex;gap:5px;align-items:center;}
.badge{font-size:8px;padding:2px 5px;border-radius:1px;border:1px solid currentColor;}
.card-meta{font-size:9px;color:var(--fg2);margin-bottom:6px;line-height:1.6;}
.tracking-err{font-size:9px;margin-bottom:6px;padding:4px 6px;background:rgba(0,0,0,0.4);border-radius:2px;border-left:2px solid var(--warn);}

.btn-row{display:flex;gap:4px;flex-wrap:wrap;}
.btn{
  padding:5px 8px;font-size:9px;font-family:'Share Tech Mono',monospace;
  background:#111925;color:var(--fg);border:1px solid var(--border);
  cursor:pointer;border-radius:2px;letter-spacing:0.5px;transition:all 0.12s;white-space:nowrap;
}
.btn:hover{background:#1a2535;border-color:var(--acc);color:var(--acc);}
.btn.on{background:var(--acc);color:#000;border-color:var(--acc);}
.btn.fetching{border-style:dashed;color:var(--warn);border-color:var(--warn);animation:blink 0.6s step-end infinite;}
.btn.ok{background:rgba(0,255,157,0.12);color:var(--ok);border-color:var(--ok);}
.btn.fail{background:rgba(255,68,85,0.12);color:var(--err);border-color:var(--err);}
.btn.del{color:#884;border-color:#332a1a;}
.btn.del:hover{color:var(--err);border-color:var(--err);background:rgba(255,68,85,0.1);}
@keyframes blink{50%{opacity:0.3;}}

.tle-area{
  display:none;width:100%;height:80px;margin-top:7px;
  background:#000;color:var(--ok);border:1px solid var(--border);
  border-radius:2px;padding:7px;font-family:'Share Tech Mono',monospace;font-size:9px;resize:vertical;
}
.tle-area:focus{outline:none;border-color:var(--acc);}
.tle-hint{display:none;font-size:9px;color:var(--fg3);margin-top:4px;line-height:1.5;}

/* ─ LOCATION / BOOKMARKS TAB ─ */
.loc-section{margin-bottom:12px;}
.sec-title{font-size:9px;letter-spacing:2px;color:var(--fg3);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.bookmark-item{
  display:flex;align-items:center;gap:6px;padding:7px 8px;
  background:#000;border:1px solid var(--border);border-radius:2px;margin-bottom:5px;cursor:pointer;
  transition:border-color 0.15s;
}
.bookmark-item:hover{border-color:var(--acc);}
.bm-name{flex:1;font-size:10px;}
.bm-pass{font-size:9px;color:var(--fg2);}
.bm-del{color:var(--fg3);font-size:11px;cursor:pointer;padding:0 3px;}
.bm-del:hover{color:var(--err);}
.pass-info{
  background:rgba(0,204,255,0.06);border:1px solid var(--border2);
  border-radius:3px;padding:8px;margin-top:8px;font-size:10px;
}
.pass-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);font-size:9px;}
.pass-row:last-child{border:none;}
.pass-count{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:var(--acc);line-height:1;}

/* ─ SAT DETAIL POPUP ─ */
#sat-detail{
  position:absolute;bottom:80px;left:14px;width:260px;
  background:rgba(6,8,16,0.97);border:1px solid var(--border2);
  border-radius:4px;z-index:2000;padding:12px;display:none;
  box-shadow:0 0 20px rgba(0,0,0,0.8);
}
.sd-title{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--acc);margin-bottom:8px;display:flex;justify-content:space-between;}
.sd-row{display:flex;justify-content:space-between;font-size:9px;padding:3px 0;border-bottom:1px solid var(--border);}
.sd-row:last-child{border:none;}
.sd-label{color:var(--fg2);}
.sd-val{color:var(--fg);font-weight:bold;}

/* ─ HUD ─ */
#hud{
  position:absolute;bottom:28px;left:14px;z-index:1000;pointer-events:none;
  display:flex;flex-direction:column;gap:6px;
}
.hud-box{
  background:rgba(6,8,16,0.85);border:1px solid var(--border);border-radius:3px;
  padding:7px 12px;font-size:9px;color:var(--fg2);letter-spacing:1px;
  backdrop-filter:blur(4px);
}
.hud-big{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--acc);line-height:1.1;}
#hud-time{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--acc);}

/* ─ MAP LABELS ─ */
.sat-label{
  background:rgba(0,0,0,0.88)!important;border:1px solid rgba(0,204,255,0.3)!important;
  color:#fff!important;font-family:'Share Tech Mono',monospace!important;
  font-size:9px!important;padding:2px 5px!important;border-radius:2px!important;white-space:nowrap;
}
.loc-marker-label{
  background:rgba(0,0,0,0.9)!important;border:1px solid var(--acc)!important;
  color:var(--acc)!important;font-family:'Share Tech Mono',monospace!important;
  font-size:10px!important;padding:3px 7px!important;border-radius:2px!important;white-space:nowrap;
}

/* footer */
.footer{
  padding:6px 12px;border-top:1px solid var(--border);
  font-size:9px;color:var(--fg3);display:flex;justify-content:space-between;
  flex-shrink:0;background:#000;
}
</style>
</head>
<body>

<!-- SEARCH BAR -->
<div id="searchbar">
  <input id="search-input" type="text" placeholder="Search location... (city, coords, landmark)" autocomplete="off"/>
  <button id="search-btn" onclick="doSearch()">SEARCH</button>
  <button id="loc-btn" onclick="geolocate()" title="Use my location">⌖</button>
  <div id="search-results"></div>
</div>

<!-- FAB -->
<div id="fab" onclick="toggleDash()" title="Mission Control">🛰</div>

<!-- SAT DETAIL POPUP -->
<div id="sat-detail">
  <div class="sd-title"><span id="sd-name">SAT NAME</span><span onclick="document.getElementById('sat-detail').style.display='none'" style="cursor:pointer;color:var(--fg3)">✕</span></div>
  <div id="sd-rows"></div>
</div>

<!-- MAIN PANEL -->
<div id="dash">
  <div class="hdr">
    <div class="hdr-title">SATCOM V12</div>
    <span class="hdr-close" onclick="toggleDash()">✕</span>
  </div>
  <div id="status-bar">
    <span id="s-msg">READY</span>
    <span id="s-utc" style="color:var(--acc)">UTC --:--:--</span>
    <span id="s-count">0 TRACKED</span>
  </div>
  <div class="pbar"><div id="p-bar"></div></div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('sats')">SATELLITES</div>
    <div class="tab" onclick="switchTab('locs')">LOCATIONS</div>
    <div class="tab" onclick="switchTab('passes')">PASSES</div>
  </div>

  <!-- SATELLITES TAB -->
  <div id="tab-sats" class="tab-panel active">
    <div class="global-actions">
      <button class="gbtn" onclick="fetchAll()">⬇ UPDATE ALL</button>
      <button class="gbtn" id="toggle-all-btn" onclick="toggleAllVis()">● SHOW ALL</button>
      <button class="gbtn" id="track-all-btn" onclick="toggleAllTracks()">⌇ TRACKS ON</button>
    </div>
    <div id="controls"></div>
  </div>

  <!-- LOCATIONS TAB -->
  <div id="tab-locs" class="tab-panel">
    <div class="loc-section">
      <div class="sec-title">ACTIVE LOCATION</div>
      <div id="active-loc-box" style="font-size:10px;color:var(--fg2);padding:6px 0;">No location set — search or use ⌖</div>
    </div>
    <div class="loc-section">
      <div class="sec-title">BOOKMARKS</div>
      <div id="bookmark-list"></div>
      <button class="gbtn" style="margin-top:6px;width:100%" onclick="bookmarkCurrent()">+ BOOKMARK CURRENT VIEW</button>
    </div>
  </div>

  <!-- PASSES TAB -->
  <div id="tab-passes" class="tab-panel">
    <div style="font-size:9px;color:var(--fg3);margin-bottom:8px;">Passes computed for active location · 24h window · ≤1200km range</div>
    <div id="pass-results"><div style="color:var(--fg3);font-size:10px;">Set a location first.</div></div>
  </div>

  <div class="footer">
    <span>SGP4 // CELESTRAK TLE</span>
    <span id="f-epoch" style="color:var(--fg3)">EPOCH —</span>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-box">
    <div style="font-size:8px;margin-bottom:2px;letter-spacing:2px">ACTIVE SATS</div>
    <div class="hud-big" id="hud-count">0</div>
  </div>
  <div class="hud-box">
    <div id="hud-time">--:--:--</div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const GROUPS = {
  ISS:     {slug:'stations', color:'#ff4455'},
  NAVIC:   {slug:'irnss',    color:'#00ff9d'},
  STARLINK:{slug:'starlink', color:'#00ccff'},
  GPS:     {slug:'gps-ops',  color:'#ffd600'},
  ONEWEB:  {slug:'oneweb',   color:'#cc66ff'},
  IRIDIUM: {slug:'iridium',  color:'#ff8833'},
};

const PROXIES = [
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
];

const TRACK_MINS = 30;       // minutes ahead for ground track
const TRACK_STEP = 60;       // seconds per step
const MAX_SATS_TRACK = 80;   // track limit per group to avoid lag
const PASS_HORIZON_KM = 1200;// pass detection range
const PASS_WINDOW_HRS = 24;

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let satVault   = loadJson('sv12') || {};
let enabled    = loadJson('sv12_en') || {};
let tracksOn   = loadJson('sv12_tr') || {};
let bookmarks  = loadJson('sv12_bm') || [];
let activeLoc  = loadJson('sv12_al') || null; // {name,lat,lng}
let markers    = {};  // key -> {name->L.circleMarker}
let tracks     = {};  // key -> {name->L.polyline}
let locMarker  = null;
let searchResultItems = [];
let allVisible = false;
let allTracksOn = false;

function loadJson(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}}
function saveJson(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ═══════════════════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════════════════
const map = L.map('map',{zoomControl:false,attributionControl:false}).setView([23.5,82],4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomleft'}).addTo(map);

// ═══════════════════════════════════════════════════════
//  FETCH
// ═══════════════════════════════════════════════════════
async function fetchGroup(key){
  const url=`https://celestrak.org/NORAD/elements/gp.php?GROUP=${GROUPS[key].slug}&FORMAT=tle`;
  for(const proxy of PROXIES){
    try{
      const r=await fetch(proxy(url),{signal:AbortSignal.timeout(12000)});
      if(!r.ok)continue;
      const t=await r.text();
      if(t.length>100&&t.includes('\n1 '))return t;
    }catch(e){continue;}
  }
  return null;
}

async function fetchUpdate(key){
  const btn=document.getElementById(`fb-${key}`);
  if(!btn)return;
  setStatus(`FETCHING ${key}…`,'warn');
  setPbar(30);btn.className='btn fetching';btn.textContent='…';
  const text=await fetchGroup(key);
  setPbar(85);
  if(text){
    satVault[key]={tles:text,ts:Date.now()};
    saveJson('sv12',satVault);
    computeTrackingError(key);
    setPbar(100);btn.className='btn ok';btn.textContent='✓ OK';
    setStatus(`${key} UPDATED`,'ok');
    setTimeout(()=>{setPbar(0);render();},1200);
  }else{
    setPbar(0);btn.className='btn fail';btn.textContent='FAIL';
    setStatus('FETCH FAILED – USE PASTE','err');
    showPaste(key);
    setTimeout(()=>render(),3000);
  }
}

async function fetchAll(){
  for(const key of Object.keys(GROUPS)){
    await fetchUpdate(key);
    await new Promise(r=>setTimeout(r,500));
  }
}

function showPaste(key){
  const ta=document.getElementById(`ta-${key}`);
  const hint=document.getElementById(`ht-${key}`);
  if(ta)ta.style.display='block';
  if(hint)hint.style.display='block';
}

function savePaste(key){
  const ta=document.getElementById(`ta-${key}`);
  if(!ta)return;
  const text=ta.value.trim();
  if(text.length>60){
    satVault[key]={tles:text,ts:Date.now()};
    saveJson('sv12',satVault);
    computeTrackingError(key);
    setStatus(`${key} LOADED`,'ok');
    render();
  }
}

// ═══════════════════════════════════════════════════════
//  TRACKING ERROR ESTIMATION
//  Compare SGP4 position at (epoch + age) vs fresh propagation
//  Gives realistic "how stale is this TLE" error estimate
// ═══════════════════════════════════════════════════════
let trackingErrors = {};

function computeTrackingError(key){
  const data=satVault[key];
  if(!data)return;
  const lines=parseTLELines(data.tles);
  if(!lines.length){trackingErrors[key]=null;return;}
  // use first valid sat
  try{
    const [,l1,l2]=lines[0];
    const satrec=satellite.twoline2satrec(l1,l2);
    const now=new Date();
    const ageHrs=(Date.now()-data.ts)/3600000;

    // pos at fetch time
    const pvNow=satellite.propagate(satrec,now);
    if(!pvNow.position){trackingErrors[key]=null;return;}

    // pos at (now + ageHrs) to simulate propagating forward
    // Actually: we compare two propagations separated by a small delta
    // Real error = deviation from actual orbit = unmeasurable without ground truth
    // Best estimate: use ballistic coefficient error model: δr ≈ 0.0025 * age_days^1.5 km for LEO
    // For a proper display we show "predicted drift from epoch":
    const ageDays=ageHrs/24;
    // Rough empirical: LEO ~1-3km/day, MEO ~0.1km/day
    const isLEO = satrec.no > 0.05; // mean motion rad/min > 0.05 ≈ < 800km alt
    const driftRate = isLEO ? 2.5 : 0.3; // km/day
    const estErrKm = (ageDays * driftRate);
    
    // Also compute actual position uncertainty by propagating slightly offset time
    const dt=60; // 1 min
    const pv1=satellite.propagate(satrec,new Date(now.getTime()-dt*500));
    const pv2=satellite.propagate(satrec,new Date(now.getTime()+dt*500));
    if(pv1.position&&pv2.position){
      const dx=pv2.position.x-pv1.position.x;
      const dy=pv2.position.y-pv1.position.y;
      const dz=pv2.position.z-pv1.position.z;
      const speed=Math.sqrt(dx*dx+dy*dy+dz*dz)/1000; // km per sec... normalize
    }
    trackingErrors[key]={estKm:estErrKm.toFixed(1),ageDays:ageDays.toFixed(2),fresh:ageHrs<6};
  }catch(e){trackingErrors[key]=null;}
}

// ═══════════════════════════════════════════════════════
//  RENDER PANEL
// ═══════════════════════════════════════════════════════
function render(){
  Object.keys(GROUPS).forEach(k=>computeTrackingError(k));
  const con=document.getElementById('controls');
  let html='';
  Object.keys(GROUPS).forEach(key=>{
    const g=GROUPS[key];
    const data=satVault[key];
    const ageH=data?(Date.now()-data.ts)/3600000:null;
    const ageD=ageH?ageH/24:null;
    const timeStr=ageH===null?'NEVER':ageH<1?`${Math.floor(ageH*60)}m ago`:ageH<48?`${Math.floor(ageH)}h ago`:`${Math.floor(ageD)}d ago`;
    const cnt=data?countSats(data.tles):0;
    const terr=trackingErrors[key];
    const driftColor=ageD===null?'#555':ageD<1?'var(--ok)':ageD<3?'var(--warn)':'var(--err)';
    const isVis=!!enabled[key];
    const isTr=!!tracksOn[key];

    html+=`<div class="group-card" style="color:${g.color};border-left-color:${g.color}">
      <div class="card-top">
        <div class="card-name">${key}</div>
        <div class="card-badges">
          ${cnt?`<span class="badge" style="color:${g.color};border-color:${g.color}">${cnt}</span>`:''}
        </div>
      </div>
      <div class="card-meta">
        <span style="color:var(--fg2)">UPDATED:</span> <span style="color:${driftColor}">${timeStr}</span>
        ${terr?`&nbsp;|&nbsp;<span style="color:var(--fg2)">TLE AGE:</span> <span style="color:${driftColor}">${terr.ageDays}d</span>`:''}
      </div>
      ${terr?`<div class="tracking-err">
        TRACKING ERROR (SGP4 drift est.) <br>
        <span style="color:var(--warn);font-size:10px;font-weight:bold">${terr.estKm} km</span>
        <span style="color:var(--fg3)"> · ${terr.fresh?'<span style="color:var(--ok)">FRESH</span>':'STALE'}</span>
      </div>`:''}
      <div class="btn-row">
        <button class="btn" id="fb-${key}" onclick="fetchUpdate('${key}')">⬇ FETCH</button>
        <button class="btn ${isVis?'on':''}" onclick="toggleVis('${key}')">${isVis?'HIDE':'SHOW'}</button>
        <button class="btn ${isTr?'on':''}" onclick="toggleTrack('${key}')" title="Ground Track">⌇ TRACK</button>
        <button class="btn" onclick="openCelestrak('${key}')" title="Open Celestrak">↗</button>
        <button class="btn del" onclick="deleteSat('${key}')">✕</button>
      </div>
      <textarea class="tle-area" id="ta-${key}" placeholder="Paste raw TLE…" onblur="savePaste('${key}')"></textarea>
      <div class="tle-hint" id="ht-${key}">Open Celestrak → Select All → Copy → Paste here</div>
    </div>`;
  });
  con.innerHTML=html;
  updateHUD();
  renderBookmarks();
}

function parseTLELines(tleText){
  if(!tleText)return[];
  const lines=tleText.split('\n').map(l=>l.trim()).filter(l=>l);
  const result=[];
  for(let i=0;i+2<lines.length;i+=3){
    if(lines[i+1].startsWith('1')&&lines[i+2].startsWith('2'))
      result.push([lines[i].replace(/^0 /,''),lines[i+1],lines[i+2]]);
  }
  return result;
}

function countSats(t){return t?Math.floor(t.split('\n').filter(l=>l.trim()).length/3):0;}

function openCelestrak(key){
  window.open(`https://celestrak.org/NORAD/elements/gp.php?GROUP=${GROUPS[key].slug}&FORMAT=tle`,'_blank');
  showPaste(key);
}

function deleteSat(key){
  if(!confirm(`Delete TLE data for ${key}?`))return;
  delete satVault[key];delete enabled[key];delete tracksOn[key];
  clearMarkers(key);clearTracks(key);
  saveJson('sv12',satVault);saveJson('sv12_en',enabled);saveJson('sv12_tr',tracksOn);
  render();
}

// ═══════════════════════════════════════════════════════
//  VISIBILITY & TRACK TOGGLES
// ═══════════════════════════════════════════════════════
function toggleVis(key){
  enabled[key]=!enabled[key];
  saveJson('sv12_en',enabled);
  if(!enabled[key]){clearMarkers(key);clearTracks(key);}
  render();
}

function toggleTrack(key){
  tracksOn[key]=!tracksOn[key];
  saveJson('sv12_tr',tracksOn);
  if(!tracksOn[key])clearTracks(key);
  render();
}

function toggleAllVis(){
  allVisible=!allVisible;
  Object.keys(GROUPS).forEach(k=>{
    enabled[k]=allVisible;
    if(!allVisible){clearMarkers(k);clearTracks(k);}
  });
  saveJson('sv12_en',enabled);
  render();
}

function toggleAllTracks(){
  allTracksOn=!allTracksOn;
  Object.keys(GROUPS).forEach(k=>{
    tracksOn[k]=allTracksOn;
    if(!allTracksOn)clearTracks(k);
  });
  saveJson('sv12_tr',tracksOn);
  render();
}

function clearMarkers(key){
  Object.values(markers[key]||{}).forEach(m=>map.removeLayer(m));
  delete markers[key];
}

function clearTracks(key){
  Object.values(tracks[key]||{}).forEach(l=>{if(Array.isArray(l))l.forEach(ll=>map.removeLayer(ll));else map.removeLayer(l);});
  delete tracks[key];
}

// ═══════════════════════════════════════════════════════
//  PROPAGATION LOOP
// ═══════════════════════════════════════════════════════
let lastPropTime=0;
const PROP_INTERVAL=4000;

function loop(ts){
  requestAnimationFrame(loop);
  const now=new Date();
  const utc=now.toISOString().slice(11,19);
  setEl('s-utc',utc);setEl('hud-time',utc);
  setEl('f-epoch',`UTC ${now.toISOString().slice(0,10)}`);
  if(ts-lastPropTime>PROP_INTERVAL){lastPropTime=ts;propagateAll();}
}

function propagateAll(){
  const now=new Date();
  const gst=satellite.gstime(now);

  Object.keys(GROUPS).forEach(key=>{
    if(!enabled[key]||!satVault[key])return;
    if(!markers[key])markers[key]={};
    if(tracksOn[key]&&!tracks[key])tracks[key]={};

    const sats=parseTLELines(satVault[key].tles);
    const color=GROUPS[key].color;

    sats.forEach(([name,l1,l2])=>{
      try{
        const satrec=satellite.twoline2satrec(l1,l2);
        const pv=satellite.propagate(satrec,now);
        if(!pv||!pv.position)return;
        const geo=satellite.eciToGeodetic(pv.position,gst);
        const lat=satellite.degreesLat(geo.latitude);
        const lng=satellite.degreesLong(geo.longitude);
        const altKm=(geo.height*6371).toFixed(0);
        if(isNaN(lat)||isNaN(lng))return;

        // Velocity
        let velKms=0;
        if(pv.velocity){const v=pv.velocity;velKms=Math.sqrt(v.x*v.x+v.y*v.y+v.z*v.z).toFixed(2);}

        // Marker
        const isISS=key==='ISS';
        if(!markers[key][name]){
          const m=L.circleMarker([lat,lng],{
            radius:isISS?7:3,color,fillColor:color,fillOpacity:0.9,
            weight:isISS?2:1,opacity:0.85,
          }).addTo(map);

          if(key==='ISS'||sats.length<=10){
            m.bindTooltip(name,{className:'sat-label',direction:'top',offset:[0,-4]});
          }

          m.on('click',()=>showSatDetail(name,lat,lng,altKm,velKms,satrec,key));
          markers[key][name]=m;
        }else{
          markers[key][name].setLatLng([lat,lng]);
          markers[key][name]._altKm=altKm;
          markers[key][name]._vel=velKms;
        }

        // Ground track
        if(tracksOn[key]&&sats.length<=MAX_SATS_TRACK){
          drawGroundTrack(key,name,satrec,color,now);
        }
      }catch(e){}
    });
  });
  updateHUD();
}

// ═══════════════════════════════════════════════════════
//  GROUND TRACK (30 min ahead + 5 min behind)
// ═══════════════════════════════════════════════════════
function drawGroundTrack(key,name,satrec,color,now){
  if(!tracks[key])tracks[key]={};

  // Remove old
  if(tracks[key][name]){
    if(Array.isArray(tracks[key][name]))
      tracks[key][name].forEach(l=>map.removeLayer(l));
    else map.removeLayer(tracks[key][name]);
  }

  const AHEAD_MINS=TRACK_MINS;
  const BEHIND_MINS=5;
  const STEP_S=TRACK_STEP;
  const pastPts=[];
  const futurePts=[];
  let prevLng=null;

  // Past track (5 min behind)
  for(let s=-BEHIND_MINS*60;s<=0;s+=STEP_S){
    const t=new Date(now.getTime()+s*1000);
    const gst=satellite.gstime(t);
    const pv=satellite.propagate(satrec,t);
    if(!pv||!pv.position)continue;
    const geo=satellite.eciToGeodetic(pv.position,gst);
    const lat=satellite.degreesLat(geo.latitude);
    let lng=satellite.degreesLong(geo.longitude);
    if(isNaN(lat)||isNaN(lng))continue;
    // Anti-meridian split: if jump > 270°, treat as wrap
    if(prevLng!==null&&Math.abs(lng-prevLng)>180){
      if(pastPts.length>1)pastPts.push(null);// segment break
    }
    prevLng=lng;pastPts.push([lat,lng]);
  }

  // Future track (30 min ahead)
  prevLng=null;
  for(let s=0;s<=AHEAD_MINS*60;s+=STEP_S){
    const t=new Date(now.getTime()+s*1000);
    const gst=satellite.gstime(t);
    const pv=satellite.propagate(satrec,t);
    if(!pv||!pv.position)continue;
    const geo=satellite.eciToGeodetic(pv.position,gst);
    const lat=satellite.degreesLat(geo.latitude);
    let lng=satellite.degreesLong(geo.longitude);
    if(isNaN(lat)||isNaN(lng))continue;
    if(prevLng!==null&&Math.abs(lng-prevLng)>180){futurePts.push(null);}
    prevLng=lng;futurePts.push([lat,lng]);
  }

  const lines=[];

  // Draw past (dashed, dimmer)
  const pastSegs=splitByNull(pastPts);
  pastSegs.forEach(seg=>{
    if(seg.length<2)return;
    lines.push(L.polyline(seg,{color,weight:1,opacity:0.3,dashArray:'3,6'}).addTo(map));
  });

  // Draw future (solid, brighter)
  const futureSegs=splitByNull(futurePts);
  futureSegs.forEach((seg,i)=>{
    if(seg.length<2)return;
    // Fade opacity along the track
    const opacity=0.7-(i*0.05);
    lines.push(L.polyline(seg,{color,weight:1.5,opacity:Math.max(0.2,opacity)}).addTo(map));
  });

  tracks[key][name]=lines;
}

function splitByNull(pts){
  const segs=[];let cur=[];
  pts.forEach(p=>{if(p===null){if(cur.length)segs.push(cur);cur=[];}else cur.push(p);});
  if(cur.length)segs.push(cur);
  return segs;
}

// ═══════════════════════════════════════════════════════
//  SAT DETAIL POPUP (click marker)
// ═══════════════════════════════════════════════════════
function showSatDetail(name,lat,lng,alt,vel,satrec,groupKey){
  document.getElementById('sd-name').textContent=name;
  const incl=(satrec.inclo*(180/Math.PI)).toFixed(2);
  const period=(2*Math.PI/satrec.no/60).toFixed(1);
  const ecc=satrec.ecco.toFixed(6);
  const apogee=((satrec.alta+1)*6371-6371).toFixed(0);
  const perigee=((satrec.altp+1)*6371-6371).toFixed(0);

  const rows=[
    ['LAT / LNG',`${lat.toFixed(3)}° / ${lng.toFixed(3)}°`],
    ['ALTITUDE',`${alt} km`],
    ['VELOCITY',`${vel} km/s`],
    ['INCLINATION',`${incl}°`],
    ['PERIOD',`${period} min`],
    ['ECCENTRICITY',ecc],
    ['APOGEE / PERIGEE',`${apogee} / ${perigee} km`],
    ['GROUP',groupKey],
  ];

  document.getElementById('sd-rows').innerHTML=rows.map(([l,v])=>
    `<div class="sd-row"><span class="sd-label">${l}</span><span class="sd-val">${v}</span></div>`
  ).join('');
  document.getElementById('sat-detail').style.display='block';
}

// ═══════════════════════════════════════════════════════
//  LOCATION SEARCH (Nominatim)
// ═══════════════════════════════════════════════════════
let searchTimeout=null;
document.getElementById('search-input').addEventListener('input',function(){
  clearTimeout(searchTimeout);
  const q=this.value.trim();
  if(q.length<3){hideSearchResults();return;}
  searchTimeout=setTimeout(()=>nominatimSearch(q),400);
});
document.getElementById('search-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')doSearch();
  if(e.key==='Escape')hideSearchResults();
});

async function nominatimSearch(q){
  try{
    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5`;
    const r=await fetch(url,{headers:{'Accept-Language':'en'}});
    const data=await r.json();
    searchResultItems=data;
    showSearchResults(data);
  }catch(e){}
}

function showSearchResults(items){
  const box=document.getElementById('search-results');
  if(!items.length){box.style.display='none';return;}
  box.innerHTML=items.map((it,i)=>
    `<div class="search-item" onclick="selectSearchResult(${i})">${it.display_name}</div>`
  ).join('');
  box.style.display='block';
}

function hideSearchResults(){
  document.getElementById('search-results').style.display='none';
}

function selectSearchResult(i){
  const it=searchResultItems[i];
  flyToLocation(parseFloat(it.lat),parseFloat(it.lon),it.display_name.split(',')[0]);
  hideSearchResults();
  document.getElementById('search-input').value=it.display_name.split(',')[0];
}

async function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  if(!q)return;
  // Check if coords
  const coords=/^(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)$/.exec(q);
  if(coords){flyToLocation(parseFloat(coords[1]),parseFloat(coords[2]),q);return;}
  await nominatimSearch(q);
  if(searchResultItems.length)selectSearchResult(0);
}

function geolocate(){
  if(!navigator.geolocation){alert('Geolocation not supported');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    flyToLocation(pos.coords.latitude,pos.coords.longitude,'My Location');
  },()=>alert('Location access denied'));
}

function flyToLocation(lat,lng,name){
  map.flyTo([lat,lng],10,{duration:1.5});
  setActiveLocation({name,lat,lng});

  // Place marker
  if(locMarker)map.removeLayer(locMarker);
  locMarker=L.circleMarker([lat,lng],{radius:8,color:'#00ccff',fillColor:'#00ccff',fillOpacity:0.3,weight:2})
    .addTo(map)
    .bindTooltip(name,{className:'loc-marker-label',permanent:true,direction:'top',offset:[0,-10]});

  computePasses(lat,lng,name);
  switchTab('passes');
}

  const box=document.getElementById('bookmark-list');
  if(!box)return;
  if(!bookmarks.length){box.innerHTML='<div style="color:var(--fg3);font-size:10px">No bookmarks yet.</div>';return;}
  box.innerHTML=bookmarks.map(b=>`
    <div class="bookmark-item" onclick="flyToLocation(${b.lat},${b.lng},'${b.name.replace(/'/g,"\\'")}')">
      <div>

        <div class="bm-pass" id="bm-pass-${b.id}">computing…</div>
      </div>
      <span class="bm-del" onclick="event.stopPropagation();deleteBookmark(${b.id})">✕</span>

  `).join('');
  // Quick pass count for each bookmark
  bookmarks.forEach(b=>{
    const cnt=quickPassCount(b.lat,b.lng,6);
    setEl(`bm-pass-${b.id}`,`~${cnt} sats overhead in 6h`);
  });
}

// ═══════════════════════════════════════════════════════
//  PASS PREDICTION ENGINE
//  For a given lat/lng, find all sats passing within horizon_km in next window_hrs
// ═══════════════════════════════════════════════════════
function haversineKm(lat1,lng1,lat2,lng2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function quickPassCount(lat,lng,windowHrs){
  let cnt=0;
  const now=new Date();
  const stepS=120;
  const steps=(windowHrs*3600)/stepS;
  Object.keys(GROUPS).forEach(key=>{
    if(!satVault[key])return;
    parseTLELines(satVault[key].tles).forEach(([,l1,l2])=>{
      try{
        const satrec=satellite.twoline2satrec(l1,l2);
        for(let s=0;s<steps;s++){
          const t=new Date(now.getTime()+s*stepS*1000);
          const gst=satellite.gstime(t);
          const pv=satellite.propagate(satrec,t);
          if(!pv||!pv.position)continue;
          const geo=satellite.eciToGeodetic(pv.position,gst);
          const slat=satellite.degreesLat(geo.latitude);
          const slng=satellite.degreesLong(geo.longitude);
          if(haversineKm(lat,lng,slat,slng)<PASS_HORIZON_KM){cnt++;break;}
        }
      }catch(e){}
    });
  });
  return cnt;
}

function computePasses(lat,lng,locName){
  const pane=document.getElementById('pass-results');
  if(!pane)return;
  pane.innerHTML=`<div style="color:var(--fg3);font-size:10px">Computing passes for <b style="color:var(--acc)">${locName}</b>…</div>`;

  // Use setTimeout to allow UI to update
  setTimeout(()=>{
    const now=new Date();
    const stepS=60;
    const windowS=PASS_WINDOW_HRS*3600;
    const results=[];// {key,name,firstPass_ms,minDist_km,maxEl_deg,duration_s}

    Object.keys(GROUPS).forEach(key=>{
      if(!satVault[key])return;
      parseTLELines(satVault[key].tles).forEach(([satName,l1,l2])=>{
        try{
          const satrec=satellite.twoline2satrec(l1,l2);
          let inPass=false,passStart=0,minDist=9999,maxEl=0;
          
          for(let s=0;s<=windowS;s+=stepS){
            const t=new Date(now.getTime()+s*1000);
            const gst=satellite.gstime(t);
            const pv=satellite.propagate(satrec,t);
            if(!pv||!pv.position)continue;
            const geo=satellite.eciToGeodetic(pv.position,gst);
            const slat=satellite.degreesLat(geo.latitude);
            const slng=satellite.degreesLong(geo.longitude);
            const saltKm=geo.height*6371;
            const surfDist=haversineKm(lat,lng,slat,slng);

            // Elevation angle
            const el=Math.atan2(saltKm,surfDist)*(180/Math.PI);

            if(surfDist<PASS_HORIZON_KM&&el>5){
              if(!inPass){inPass=true;passStart=t.getTime();minDist=surfDist;maxEl=el;}
              else{if(surfDist<minDist)minDist=surfDist;if(el>maxEl)maxEl=el;}
            }else if(inPass){
              inPass=false;
              const dur=t.getTime()-passStart;
              results.push({key,name:satName,firstPass:passStart,minDist:minDist.toFixed(0),maxEl:maxEl.toFixed(1),dur:Math.round(dur/60000)});
              break;// only first pass per sat
            }
          }
        }catch(e){}
      });
    });

    results.sort((a,b)=>a.firstPass-b.firstPass);
    const grouped={};
    results.forEach(r=>{if(!grouped[r.key])grouped[r.key]=[];grouped[r.key].push(r);});

    if(!results.length){pane.innerHTML=`<div style="color:var(--fg3);font-size:10px">No passes found in ${PASS_WINDOW_HRS}h window. Load TLE data first.</div>`;return;}

    const nextHrs=((results[0].firstPass-now.getTime())/3600000);
    const nextStr=nextHrs<1?`${Math.round(nextHrs*60)}m`:nextHrs<24?`${nextHrs.toFixed(1)}h`:`${(nextHrs/24).toFixed(1)}d`;

    let html=`
      <div class="pass-info" style="margin-bottom:10px">
        <div style="color:var(--fg3);font-size:9px;margin-bottom:4px">NEXT ${PASS_WINDOW_HRS}H OVERHEAD PASSES</div>
        <div style="display:flex;align-items:baseline;gap:10px">
          <div><div class="pass-count">${results.length}</div><div style="font-size:9px;color:var(--fg3)">TOTAL PASSES</div></div>
          <div><div class="pass-count" style="color:var(--ok)">${nextStr}</div><div style="font-size:9px;color:var(--fg3)">NEXT PASS</div></div>
        </div>
      </div>`;

    Object.keys(grouped).forEach(key=>{
      const grp=grouped[key];
      const color=GROUPS[key].color;
      html+=`<div style="margin-bottom:10px">
        <div style="font-size:9px;color:${color};letter-spacing:2px;font-family:'Orbitron',sans-serif;margin-bottom:4px">${key} — ${grp.length} passes</div>`;

      grp.slice(0,6).forEach(p=>{
        const d=new Date(p.firstPass);
        const inHrs=((p.firstPass-now.getTime())/3600000);
        const inStr=inHrs<1?`in ${Math.round(inHrs*60)}m`:inHrs<24?`in ${inHrs.toFixed(1)}h`:`in ${(inHrs/24).toFixed(1)}d`;
        html+=`<div class="pass-row">
          <span style="color:var(--fg)">${p.name.slice(0,22)}</span>
          <span style="color:var(--warn)">${inStr}</span>
          <span style="color:var(--fg3)">${p.maxEl}° el</span>
          <span style="color:var(--fg3)">${p.dur}min</span>
        </div>`;
      });
      if(grp.length>6)html+=`<div style="font-size:9px;color:var(--fg3);padding:3px 0">+${grp.length-6} more passes</div>`;
      html+='</div>';
    });

    pane.innerHTML=html;
  },50);
}

// ═══════════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════════
function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const ids=['sats','locs','passes'];
    t.className='tab'+(ids[i]===id?' active':'');
  });
  document.querySelectorAll('.tab-panel').forEach(p=>{
    p.className='tab-panel'+(p.id===`tab-${id}`?' active':'');
  });
  if(id==='locs'){renderBookmarks();setActiveLocBox();}
  if(id==='passes'&&activeLoc)computePasses(activeLoc.lat,activeLoc.lng,activeLoc.name);
}

function setActiveLocBox(){
  const box=document.getElementById('active-loc-box');
  if(!box)return;
  if(activeLoc)
    box.innerHTML=`<b style="color:var(--acc)">${activeLoc.name}</b><br><span style="color:var(--fg3)">${activeLoc.lat.toFixed(4)}°, ${activeLoc.lng.toFixed(4)}°</span>`;
  else
    box.textContent='No location set — search above or tap ⌖';
}

// ═══════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════
function toggleDash(){
  const d=document.getElementById('dash');
  d.style.display=d.style.display==='flex'?'none':'flex';
}

// Close search on map click
map.on('click',()=>hideSearchResults());

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
// Restore active location marker
if(activeLoc){
  locMarker=L.circleMarker([activeLoc.lat,activeLoc.lng],{
    radius:8,color:'#00ccff',fillColor:'#00ccff',fillOpacity:0.3,weight:2
  }).addTo(map).bindTooltip(activeLoc.name,{className:'loc-marker-label',permanent:true,direction:'top',offset:[0,-10]});
  setActiveLocBox();
}

render();
toggleDash();
requestAnimationFrame(loop);
propagateAll();
</script>
</body>
</html>
