<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATCOM // V10</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --bg: #0a0a0a; --panel: #1a1a1a; --fg: #e0e0e0; --accent: #00ccff; 
            --ok: #00ff9d; --warn: #ffcc00; --err: #ff4444; 
        }
        body, html { margin:0; padding:0; height:100%; background:var(--bg); color:var(--fg); font-family:'Courier New',monospace; overflow:hidden; }
        #map { height:100vh; width:100vw; }
        #fab { 
            position:absolute; bottom:30px; right:30px; width:70px; height:70px; 
            background:var(--accent); color:#000; border-radius:50%; display:flex; 
            align-items:center; justify-content:center; cursor:pointer; z-index:2000; 
            font-size:32px; box-shadow:0 6px 25px rgba(0,204,255,0.6); 
        }
        #dash { 
            position:absolute; top:20px; right:20px; width:460px; max-height:85vh; 
            background:var(--panel); border:3px solid var(--accent); box-shadow:0 0 25px rgba(0,204,255,0.4); 
            border-radius:8px; display:none; flex-direction:column; z-index:1999; overflow:hidden; 
        }
        .header { background:#000; padding:16px; font-size:16px; font-weight:bold; display:flex; justify-content:space-between; }
        .content { padding:16px; overflow-y:auto; flex:1; }
        .group-card { 
            background:#222; border-left:6px solid var(--accent); margin-bottom:14px; 
            padding:14px; border-radius:6px; 
        }
        button { 
            padding:9px 13px; margin:4px 2px; font-size:11px; background:#333; color:white; 
            border:1px solid #555; cursor:pointer; border-radius:4px; 
        }
        button.active { background:var(--accent); color:black; }
        button.danger { background:#600; }
        textarea { width:100%; height:110px; margin-top:8px; background:#111; color:#0f0; border:1px solid #666; display:none; padding:8px; }
    </style>
</head>
<body>

<div id="fab" onclick="toggleDash()">🛰️</div>

<div id="dash">
    <div class="header">
        SATCOM V10 
        <span onclick="toggleDash()" style="cursor:pointer">×</span>
    </div>
    <div class="content" id="controls"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
    const GROUPS = ["ISS", "NAVIC", "STARLINK", "GPS", "ONEWEB", "IRIDIUM"];

    let satVault = JSON.parse(localStorage.getItem('sat_v10')) || {};
    let enabled = JSON.parse(localStorage.getItem('sat_v10_enabled')) || {};

    const map = L.map('map').setView([23.5, 88], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function render() {
        let html = '';
        GROUPS.forEach(key => {
            const data = satVault[key];
            const hours = data ? (Date.now() - data.ts) / 3600000 : 999;
            const color = hours < 6 ? 'lime' : hours < 48 ? 'yellow' : 'red';
            html += `
                <div class="group-card">
                    <div style="display:flex;justify-content:space-between">
                        <b>${key}</b>
                        <span style="color:${color}">Err: ${data ? '~5km' : '?'}</span>
                    </div>
                    <div style="font-size:11px;color:#aaa">Last updated: ${data ? Math.floor(hours)+'h ago' : 'Never'}</div>
                    <div style="margin-top:8px">
                        <button onclick="fetchUpdate('${key}')">FETCH</button>
                        <button onclick="openCelestrak('${key}')">→</button>
                        <button onclick="deleteGroup('${key}')" class="danger">DEL</button>
                        <button onclick="toggleVis('${key}')" class="${enabled[key]?'active':''}">${enabled[key]?'HIDE':'SHOW'}</button>
                    </div>
                    <textarea id="ta-${key}" placeholder="Paste TLE here..." onblur="savePaste('${key}')"></textarea>
                </div>`;
        });
        document.getElementById('controls').innerHTML = html;
    }

    function toggleDash() {
        const d = document.getElementById('dash');
        d.style.display = (d.style.display === 'flex') ? 'none' : 'flex';
    }

    function openCelestrak(key) {
        window.open(`https://celestrak.org/NORAD/elements/gp.php?GROUP=${key.toLowerCase().replace('starlink','starlink')}&FORMAT=tle`, '_blank');
        document.getElementById(`ta-${key}`).style.display = 'block';
    }

    function savePaste(key) {
        const text = document.getElementById(`ta-${key}`).value.trim();
        if (text.length > 50) {
            satVault[key] = { tles: text, ts: Date.now() };
            localStorage.setItem('sat_v10', JSON.stringify(satVault));
            render();
        }
    }

    function toggleVis(key) {
        enabled[key] = !enabled[key];
        localStorage.setItem('sat_v10_enabled', JSON.stringify(enabled));
        render();
    }

    function deleteGroup(key) {
        if (confirm(`Delete ${key}?`)) {
            delete satVault[key];
            delete enabled[key];
            localStorage.setItem('sat_v10', JSON.stringify(satVault));
            localStorage.setItem('sat_v10_enabled', JSON.stringify(enabled));
            render();
        }
    }

    function fetchUpdate(key) {
        alert("Auto-fetch is unreliable on GitHub Pages.\n\nUse the → button to open Celestrak, copy the text, then paste it in the box below.");
    }

    // Initialize
    render();
    toggleDash();   // Open the panel automatically

    // Basic map loop
    function loop() {
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
    </html>
